    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "How do your services work in practice?", "acceptedAnswer": { "@type": "Answer", "text": "We start with a discovery session to understand your business — how it operates, where the gaps are, and what outcomes you need. From there we scope a focused engagement, agree on deliverables, and work through implementation together. You are never handed a document and left to figure it out alone." } },
        { "@type": "Question", "name": "Do you offer once-off services or ongoing support?", "acceptedAnswer": { "@type": "Answer", "text": "Both. Our pricing structure moves from once-off entry and project engagements to monthly retainers. You can start with a single focused project and move into ongoing support once the relationship is established." } },
        { "@type": "Question", "name": "Is this suitable for early stage businesses?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Many of our clients are past the idea stage but have not yet formalised how they operate. If you are generating revenue but running on instinct, this is exactly the stage where structured support creates the most impact." } },
        { "@type": "Question", "name": "Do you create logos or video content?", "acceptedAnswer": { "@type": "Answer", "text": "We do not create logos and video content as part of our Graphic Design pillar. We focus on static and document-based visual assets that support business positioning and execution." } },
        { "@type": "Question", "name": "Do you handle media placements or press coverage?", "acceptedAnswer": { "@type": "Answer", "text": "Our PR work focuses on positioning, messaging strategy, stakeholder communication, and authority building rather than paid media placement. We build the narrative infrastructure your business needs to earn coverage organically." } },
        { "@type": "Question", "name": "How long does a project take?", "acceptedAnswer": { "@type": "Answer", "text": "Entry-level engagements are typically completed within one to two weeks. Mid-tier projects run two to four weeks. Senior and multi-session projects are scoped individually. Retainers operate on a monthly cadence with agreed deliverables per cycle." } },
        { "@type": "Question", "name": "What do you need from us to get started?", "acceptedAnswer": { "@type": "Answer", "text": "Clarity on what you are trying to solve and willingness to engage in the process. We send a short onboarding brief before any engagement begins so we can prepare properly. You do not need a polished brief — just an honest one." } },
        { "@type": "Question", "name": "Will you manage everything for us?", "acceptedAnswer": { "@type": "Answer", "text": "We are not a management company. We integrate into your workflow, build the systems, and support execution — but the business remains yours to lead. Our goal is to leave you with something you can operate independently, not to create dependency on us." } }
      ]
    }
